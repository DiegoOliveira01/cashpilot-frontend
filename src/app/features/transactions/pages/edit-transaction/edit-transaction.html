<div class="min-h-screen bg-gray-950 p-6">
  <div class="max-w-lg mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <button
        routerLink="/dashboard"
        class="text-gray-400 hover:text-white transition cursor-pointer"
      >
        ← Voltar
      </button>
      <div>
        <h1 class="text-2xl font-bold text-white">Editar Transação</h1>
        <p class="text-gray-400 text-sm mt-1">Atualize os dados da transação</p>
      </div>
    </div>

    <!-- Card do formulário -->
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <!-- Descrição -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Descrição
          </label>
          <input
            formControlName="description"
            placeholder="Ex: Salário, Aluguel, Mercado..."
            class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Valor -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Valor
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">R$</span>
            <input
              type="number"
              formControlName="amount"
              placeholder="0,00"
              class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>
        </div>

        <!-- Tipo -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Tipo
          </label>
          <div class="grid grid-cols-2 gap-3">
            <button
              type="button"
              (click)="form.get('type')?.setValue('INCOME')"
              class="py-2.5 rounded-lg text-sm font-semibold border transition cursor-pointer"
              [class.bg-green-500]="form.get('type')?.value === 'INCOME'"
              [class.text-white]="form.get('type')?.value === 'INCOME'"
              [class.border-green-500]="form.get('type')?.value === 'INCOME'"
              [class.bg-gray-800]="form.get('type')?.value !== 'INCOME'"
              [class.text-gray-400]="form.get('type')?.value !== 'INCOME'"
              [class.border-gray-700]="form.get('type')?.value !== 'INCOME'"
            >
              + Receita
            </button>
            <button
              type="button"
              (click)="form.get('type')?.setValue('EXPENSE')"
              class="py-2.5 rounded-lg text-sm font-semibold border transition cursor-pointer"
              [class.bg-red-500]="form.get('type')?.value === 'EXPENSE'"
              [class.text-white]="form.get('type')?.value === 'EXPENSE'"
              [class.border-red-500]="form.get('type')?.value === 'EXPENSE'"
              [class.bg-gray-800]="form.get('type')?.value !== 'EXPENSE'"
              [class.text-gray-400]="form.get('type')?.value !== 'EXPENSE'"
              [class.border-gray-700]="form.get('type')?.value !== 'EXPENSE'"
            >
              - Despesa
            </button>
          </div>
        </div>

        <!-- Data -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Data
          </label>
          <input
            type="date"
            formControlName="date"
            class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Botões -->
        <div class="flex gap-3">
          <button
            type="button"
            routerLink="/dashboard"
            class="flex-1 bg-gray-800 hover:bg-gray-700 text-gray-300 font-semibold py-2.5 rounded-lg text-sm transition cursor-pointer"
          >
            Cancelar
          </button>
          <button
            type="submit"
            [disabled]="form.invalid"
            class="flex-1 bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-lg text-sm transition cursor-pointer"
          >
            Atualizar
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
