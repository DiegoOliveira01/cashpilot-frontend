<div class="min-h-screen bg-gray-950 p-6">
  <div class="max-w-lg mx-auto">

    <!-- Header -->
    <div class="flex items-center gap-4 mb-8">
      <button
        routerLink="/dashboard"
        class="text-gray-400 hover:text-white transition cursor-pointer"
      >
        ← Voltar
      </button>
      <div>
        <h1 class="text-2xl font-bold text-white">Nova Transação</h1>
        <p class="text-gray-400 text-sm mt-1">Adicione uma nova receita ou despesa</p>
      </div>
    </div>

    <!-- Card do formulário -->
    <div class="bg-gray-900 rounded-2xl p-6 border border-gray-800">
      <form (ngSubmit)="submit()">

        <!-- Descrição -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Descrição
          </label>
          <input
            [(ngModel)]="form.description"
            name="description"
            required
            placeholder="Ex: Salário, Aluguel, Mercado..."
            class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Valor -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Valor
          </label>
          <div class="relative">
            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-sm">R$</span>
            <input
              type="number"
              [(ngModel)]="form.amount"
              name="amount"
              required
              placeholder="0,00"
              class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg pl-10 pr-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
            />
          </div>
        </div>

        <!-- Tipo -->
        <div class="mb-5">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Tipo
          </label>
          <div class="grid grid-cols-2 gap-3">
            <button
              type="button"
              (click)="form.type = 'INCOME'"
              class="py-2.5 rounded-lg text-sm font-semibold border transition cursor-pointer"
              [class.bg-green-500]="form.type === 'INCOME'"
              [class.text-white]="form.type === 'INCOME'"
              [class.border-green-500]="form.type === 'INCOME'"
              [class.bg-gray-800]="form.type !== 'INCOME'"
              [class.text-gray-400]="form.type !== 'INCOME'"
              [class.border-gray-700]="form.type !== 'INCOME'"
            >
              + Receita
            </button>
            <button
              type="button"
              (click)="form.type = 'EXPENSE'"
              class="py-2.5 rounded-lg text-sm font-semibold border transition cursor-pointer"
              [class.bg-red-500]="form.type === 'EXPENSE'"
              [class.text-white]="form.type === 'EXPENSE'"
              [class.border-red-500]="form.type === 'EXPENSE'"
              [class.bg-gray-800]="form.type !== 'EXPENSE'"
              [class.text-gray-400]="form.type !== 'EXPENSE'"
              [class.border-gray-700]="form.type !== 'EXPENSE'"
            >
              - Despesa
            </button>
          </div>
        </div>

        <!-- Data -->
        <div class="mb-8">
          <label class="block text-sm font-medium text-gray-300 mb-1">
            Data
          </label>
          <input
            type="date"
            [(ngModel)]="form.date"
            name="date"
            required
            class="w-full bg-gray-800 text-white border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
          />
        </div>

        <!-- Botão -->
        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition duration-200 cursor-pointer"
        >
          Salvar Transação
        </button>

      </form>
    </div>
  </div>
</div>
