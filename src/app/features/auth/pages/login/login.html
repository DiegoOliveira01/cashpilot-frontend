<div class="flex items-center justify-center min-h-[calc(100vh-64px)] px-4">
  <div class="w-full max-w-md bg-gray-900 rounded-2xl p-8 shadow-lg">

    <!-- Logo / Título -->
    <div class="mb-8 text-center">
      <h1 class="text-3xl font-bold text-white">Cash Pilot</h1>
      <p class="text-gray-400 mt-1 text-sm">Gerencie suas finanças com simplicidade</p>
    </div>

    <!-- Formulário -->
    <form (ngSubmit)="onLogin()">

      <div class="mb-5">
        <label class="block text-sm font-medium text-gray-300 mb-1">
          Email
        </label>
        <input
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          placeholder="seu@email.com"
          class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
        />
      </div>

      <div class="mb-6">
        <label class="block text-sm font-medium text-gray-300 mb-1">
          Senha
        </label>
        <input
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          placeholder="••••••••"
          class="w-full bg-gray-800 text-white placeholder-gray-500 border border-gray-700 rounded-lg px-4 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition"
        />
      </div>

      <button
        type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2.5 rounded-lg text-sm transition duration-200 cursor-pointer"
      >
        Entrar
      </button>

    </form>

    <!-- Erro -->
    @if (errormessage) {
      <p class="mt-4 text-center text-sm text-red-400">
        {{ errormessage }}
      </p>
    }

    <!-- Link registro -->
    <p class="mt-6 text-center text-sm text-gray-500">
      Não tem conta?
      <a routerLink="/register" class="text-indigo-400 hover:text-indigo-300 font-medium transition">
        Cadastre-se
      </a>
    </p>

  </div>
</div>
