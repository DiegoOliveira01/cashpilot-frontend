<h2>Login</h2>

<form (ngSubmit)="onLogin()">
  <div>
    <label>Email</label><br />
    <input
      type="email"
      [(ngModel)]="email"
      name="email"
      required
    />
  </div>

  <div>
    <label>Senha</label><br />
    <input
      type="password"
      [(ngModel)]="password"
      name="password"
      required
    />
  </div>

  <br />

  <button type="submit">Entrar</button>
</form>

<p *ngIf="errorMessage" style="color: red;">
  {{ errormessage }}
</p>
